[build]
builder = "nixpacks"

[build.nixpacks]
aptPkgs = ["libpq-dev", "libstdc++6"]

[deploy]
startCommand = "cd backend && LD_LIBRARY_PATH=/usr/lib/x86_64-linux-gnu:$LD_LIBRARY_PATH /app/venv/bin/alembic upgrade head && LD_LIBRARY_PATH=/usr/lib/x86_64-linux-gnu:$LD_LIBRARY_PATH /app/venv/bin/uvicorn app.main:app --host 0.0.0.0 --port ${PORT:-8000}"
healthcheckPath = "/api/health"
healthcheckTimeout = 30
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3
