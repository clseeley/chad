[build]
builder = "nixpacks"

[build.nixpacks]
aptPkgs = ["libpq-dev"]

[deploy]
startCommand = "cd backend && /app/venv/bin/alembic upgrade head && /app/venv/bin/uvicorn app.main:app --host 0.0.0.0 --port ${PORT:-8000}"
healthcheckPath = "/api/health"
healthcheckTimeout = 30
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3
