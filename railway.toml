[build]
builder = "nixpacks"

[build.nixpacks]
aptPkgs = ["libpq-dev", "libstdc++6"]

[deploy]
startCommand = "export LD_LIBRARY_PATH=$(find /nix/store -name 'libstdc++.so.6' -printf '%h\n' 2>/dev/null | head -1):$LD_LIBRARY_PATH && cd backend && /app/venv/bin/alembic upgrade head && /app/venv/bin/uvicorn app.main:app --host 0.0.0.0 --port ${PORT:-8000}"
healthcheckPath = "/api/health"
healthcheckTimeout = 30
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3
