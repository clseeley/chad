[phases.setup]
nixPkgs = ["python39", "python39Packages.pip", "python39Packages.virtualenv", "nodejs-18_x", "stdenv.cc.cc.lib"]

[phases.frontend]
cmds = ["cd frontend && npm ci && npm run build"]

[phases.install]
cmds = ["cd backend && python3 -m venv /app/venv && /app/venv/bin/pip install -r requirements.txt"]

[start]
cmd = "cd backend && /app/venv/bin/alembic upgrade head && /app/venv/bin/uvicorn app.main:app --host 0.0.0.0 --port ${PORT:-8000}"
