[phases.setup]
nixPkgs = ["python39", "python39Packages.pip", "nodejs-18_x"]

[phases.frontend]
cmds = ["cd frontend && npm ci && npm run build"]

[phases.install]
cmds = ["cd backend && python3 -m pip install -r requirements.txt"]

[start]
cmd = "cd backend && alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port ${PORT:-8000}"
